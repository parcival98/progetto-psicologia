server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"
      routes:
        - id: patient-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/patients/**
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/appointments/**
        - id: email-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/emails/**